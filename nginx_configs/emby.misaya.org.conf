# Emby服务器配置 - 智能路由版本
# 使用Lua动态路由到用户绑定的VPS线路

# 定义默认后端变量
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 443 ssl http2;
    server_name emby.misaya.org;

    # Cloudflare Origin证书
    ssl_certificate /etc/ssl/cloudflare/emby.misaya.org/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/emby.misaya.org/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Cloudflare真实IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # 访问日志
    access_log /var/log/nginx/emby_access.log;
    error_log /var/log/nginx/emby_error.log;

    # 定义后端服务器变量
    set $backend_server "";

    location / {
        # Lua智能路由 - 根据用户ID查询Redis获取绑定线路
        rewrite_by_lua_file /etc/nginx/lua/emby_route.lua;

        # Lua访问控制
        access_by_lua_file /etc/nginx/lua/emby_guard.lua;

        # 如果Lua路由未设置后端，使用默认本地服务器
        if ($backend_server = "") {
            set $backend_server "127.0.0.1:8096";
        }

        # 代理到动态后端
        proxy_pass https://$backend_server;
        proxy_http_version 1.1;

        # 必要的代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 传递Emby客户端信息
        proxy_set_header X-Emby-Token $http_x_emby_token;

        # 缓冲设置
        proxy_buffering off;
        proxy_buffer_size 4k;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 跳过SSL验证（VPS使用自签名或Let's Encrypt证书）
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        # 重定向处理
        proxy_redirect off;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "Emby Router OK\n";
        add_header Content-Type text/plain;
    }

    # 禁止访问敏感路径
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# HTTP重定向到HTTPS
server {
    listen 80;
    server_name emby.misaya.org;

    location / {
        return 301 https://$server_name$request_uri;
    }
}
