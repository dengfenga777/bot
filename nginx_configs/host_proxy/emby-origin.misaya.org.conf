# Emby 受保护回源入口
# 仅用于用户自定义共享线路的最终回源，不提供公开直连访问能力。

server {
    listen 80;
    listen [::]:80;
    server_name emby-origin.misaya.org;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name emby-origin.misaya.org;

    ssl_certificate     /etc/letsencrypt/live/emby-origin.misaya.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emby-origin.misaya.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:EMBY_ORIGIN_SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/emby_origin_access.log;
    error_log  /var/log/nginx/emby_origin_error.log;

    location / {
        proxy_pass http://127.0.0.1:18083;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        client_max_body_size 0;
        proxy_connect_timeout 60s;
        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
    }

    location /embywebsocket {
        proxy_pass http://127.0.0.1:18083;
        proxy_http_version 1.1;
        proxy_buffering off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
    }
}
