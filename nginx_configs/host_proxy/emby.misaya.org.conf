# Emby 前置入口配置
# 这份配置部署在宿主机标准 Nginx 上，不依赖 Lua。
# 动态路由交给本地 OpenResty 媒体网关处理。

server {
    listen 80;
    listen [::]:80;
    server_name emby.misaya.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name emby.misaya.org;

    ssl_certificate     /etc/letsencrypt/live/emby.misaya.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emby.misaya.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:EMBY_SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/emby_access.log;
    error_log  /var/log/nginx/emby_error.log;

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        client_max_body_size 0;
        proxy_connect_timeout 60s;
        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
    }

    location /embywebsocket {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_buffering off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
    }
}
