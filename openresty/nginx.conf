worker_processes auto;

env PLEX_API_TOKEN;
env SESSION_SECRET_KEY;
env MEDIA_ROUTE_SIGNING_SECRET;
env MEDIA_ROUTE_SIGN_TTL;
env REDIS_HOST;
env REDIS_PORT;
env PLEX_LOCAL_ORIGIN;
env EMBY_LOCAL_ORIGIN;
env PLEX_PUBLIC_HOST;
env EMBY_PUBLIC_HOST;
env PLEX_ORIGIN_HOST;
env EMBY_ORIGIN_HOST;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    lua_package_path "/etc/openresty/lua/?.lua;;";
    lua_shared_dict plex_token_cache 10m;

    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    include /etc/openresty/conf.d/*.conf;
}
